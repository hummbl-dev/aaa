name: conformance

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python -m pip install --upgrade pip
      - run: python -m pip install jsonschema
      - run: python3 conformance/verify_conformance.py
      - run: python3 conformance/verify_conformance.py
